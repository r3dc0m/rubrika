services:

  db:
    image: postgres:latest
    container_name: rubrika_postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - ${DB_PORT}:5432
    restart: unless-stopped
    networks:
      - rubrika-net
    volumes:
      - ./db/data:/var/lib/postgresql/18/docker


networks:
  rubrika-net:
    driver: bridge